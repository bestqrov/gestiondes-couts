<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Customs Declaration → Excel</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 640px; margin: 60px auto; padding: 0 20px; color: #1a1a1a; }
    h1 { font-size: 20px; }
    .drop-zone {
      border: 2px dashed #999; border-radius: 8px; padding: 24px; margin: 16px 0;
      text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .drop-zone.dragover { border-color: #2563eb; background: #eff6ff; }
    .drop-zone input { display: none; }
    .drop-zone .filename { margin-top: 8px; font-size: 13px; color: #2563eb; font-weight: 600; }
    .drop-zone .label { font-weight: 600; }
    .drop-zone .hint { font-size: 12px; color: #666; margin-top: 4px; }
    button {
      width: 100%; padding: 12px; font-size: 15px; font-weight: 600;
      background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer;
    }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    .error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; border-radius: 6px; padding: 12px; margin-bottom: 16px; white-space: pre-wrap; font-size: 13px; }
    #status { margin-top: 16px; font-size: 13px; color: #666; text-align: center; }
  </style>
</head>
<body>
  <h1>Déclaration douanière → Excel</h1>
  <p>Déposez ou sélectionnez les 2 documents (Liquidation + DUM), puis générez.</p>

  {{ERROR_BLOCK}}

  <form id="uploadForm" method="post" action="/generate" enctype="multipart/form-data">
    <div class="drop-zone" id="zone-liquidation">
      <div class="label">Liquidation Douanière (BE)</div>
      <div class="hint">PDF ou image — cliquez ou glissez-déposez</div>
      <div class="filename" id="name-liquidation"></div>
      <input type="file" name="liquidation" id="input-liquidation" accept=".pdf,.png,.jpg,.jpeg,.tif,.tiff,.bmp" required />
    </div>

    <div class="drop-zone" id="zone-dum">
      <div class="label">DUM</div>
      <div class="hint">PDF ou image — cliquez ou glissez-déposez</div>
      <div class="filename" id="name-dum"></div>
      <input type="file" name="dum" id="input-dum" accept=".pdf,.png,.jpg,.jpeg,.tif,.tiff,.bmp" required />
    </div>

    <button type="submit" id="submitBtn">Générer les fichiers Excel</button>
    <div id="status"></div>
  </form>

  <script>
    function wireDropZone(zoneId, inputId, nameId) {
      const zone = document.getElementById(zoneId);
      const input = document.getElementById(inputId);
      const nameEl = document.getElementById(nameId);

      zone.addEventListener('click', () => input.click());
      input.addEventListener('change', () => {
        nameEl.textContent = input.files[0] ? input.files[0].name : '';
      });
      zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
      zone.addEventListener('drop', (e) => {
        e.preventDefault();
        zone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) {
          input.files = e.dataTransfer.files;
          nameEl.textContent = input.files[0].name;
        }
      });
    }

    wireDropZone('zone-liquidation', 'input-liquidation', 'name-liquidation');
    wireDropZone('zone-dum', 'input-dum', 'name-dum');

    document.getElementById('uploadForm').addEventListener('submit', () => {
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('status').textContent = 'Traitement en cours (OCR + parsing + génération)...';
    });
  </script>
</body>
</html>
