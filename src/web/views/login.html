<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connexion — Déclaration Douanière</title>
  {{FAVICON_LINK}}
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <style>
    :root {
      --ink-900: #0f172a;
      --ink-700: #334155;
      --ink-500: #64748b;
      --ink-400: #94a3b8;
      --line: #e2e8f0;
      --line-soft: #eef2f7;
      --brand: #4338ca;
      --brand-600: #4f46e5;
      --brand-700: #3730a3;
      --brand-soft: #eef2ff;
      --danger: #b91c1c;
      --danger-bg: #fef2f2;
      --danger-line: #fecaca;
      --card-bg: #ffffff;
      --page-bg-3: #f8fafc;
      --input-bg: #f8fafc;
      --panel-bg: #0b0a1a;
      --panel-ink-muted: #94a3b8;
    }

    :root[data-theme="dark"] {
      --ink-900: #f1f5f9;
      --ink-700: #cbd5e1;
      --ink-500: #94a3b8;
      --ink-400: #64748b;
      --line: #334155;
      --line-soft: #1e293b;
      --brand: #818cf8;
      --brand-600: #6366f1;
      --brand-700: #818cf8;
      --brand-soft: #1e1b4b;
      --danger: #f87171;
      --danger-bg: #3f1212;
      --danger-line: #7f1d1d;
      --card-bg: #0f172a;
      --page-bg-3: #020617;
      --input-bg: #1e293b;
      --panel-bg: #05040c;
      --panel-ink-muted: #7c7295;
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; padding: 0; height: 100%; }

    body {
      min-height: 100vh;
      display: flex;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink-900);
      background: var(--page-bg-3);
      transition: background 0.2s, color 0.2s;
    }

    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #e2e8f0;
      transition: background 0.15s, border-color 0.15s;
      z-index: 10;
    }
    .theme-toggle:hover { border-color: var(--brand-600); }
    .theme-toggle svg { width: 18px; height: 18px; }
    .theme-toggle .icon-moon { display: none; }
    :root[data-theme="dark"] .theme-toggle .icon-sun { display: none; }
    :root[data-theme="dark"] .theme-toggle .icon-moon { display: block; }

    .split { display: flex; width: 100%; min-height: 100vh; }

    /* Left brand panel */
    .brand-panel {
      flex: 1;
      min-width: 0;
      background: radial-gradient(900px 500px at 15% 15%, #1e1b4b 0%, transparent 60%), var(--panel-bg);
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 32px;
    }
    .brand-badge {
      width: 84px; height: 84px; border-radius: 20px;
      background: linear-gradient(135deg, var(--brand-600), var(--brand-700));
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 26px;
      box-shadow: 0 16px 32px -10px rgba(79, 70, 229, 0.55);
      overflow: hidden;
    }
    .brand-badge img { width: 100%; height: 100%; object-fit: cover; }
    .brand-badge svg { width: 40px; height: 40px; }
    .brand-title {
      font-size: 34px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 4px;
      max-width: 480px; line-height: 1.15;
    }
    .brand-title .accent { color: #818cf8; }
    .brand-divider { width: 64px; height: 3px; border-radius: 2px; background: var(--brand-600); margin: 20px 0; }
    .brand-tagline {
      font-size: 15px; color: var(--panel-ink-muted); max-width: 380px; line-height: 1.6; margin: 0;
    }
    .brand-footnote {
      position: absolute; bottom: 28px; left: 0; right: 0; text-align: center;
      font-size: 11px; letter-spacing: 0.14em; color: var(--panel-ink-muted); text-transform: uppercase;
    }
    .brand-panel { position: relative; }

    /* Right form panel */
    .form-panel {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--card-bg);
      padding: 32px;
      transition: background 0.2s;
    }
    .form-wrap { width: 100%; max-width: 380px; }

    .form-logo {
      width: 74px; height: 74px; border-radius: 18px; overflow: hidden;
      margin: 0 auto 22px; box-shadow: 0 10px 24px -10px rgba(15, 23, 42, 0.3);
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, var(--brand-600), var(--brand-700));
    }
    .form-logo img { width: 100%; height: 100%; object-fit: cover; }
    .form-logo svg { width: 34px; height: 34px; }

    h1.form-title {
      font-size: 24px; font-weight: 800; letter-spacing: -0.01em; margin: 0 0 24px; text-align: center;
    }
    h1.form-title .accent { color: var(--brand-600); }

    .error {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid var(--danger-line);
      border-radius: 10px;
      padding: 11px 13px;
      margin-bottom: 18px;
      font-size: 13px;
      line-height: 1.45;
    }
    .error svg { flex: none; margin-top: 1px; }

    label {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--ink-700);
      margin: 0 0 6px;
      letter-spacing: 0.01em;
    }

    .field { margin-bottom: 16px; }

    input {
      width: 100%;
      padding: 13px 15px;
      font-size: 14.5px;
      font-family: inherit;
      color: var(--ink-900);
      background: var(--input-bg);
      border: 1.5px solid var(--line);
      border-radius: 10px;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }
    input::placeholder { color: var(--ink-400); }
    input:hover { border-color: var(--brand-600); }
    input:focus {
      outline: none;
      background: var(--card-bg);
      border-color: var(--brand-600);
      box-shadow: 0 0 0 3.5px rgba(79, 70, 229, 0.14);
    }

    button {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      font-size: 14.5px;
      font-weight: 700;
      font-family: inherit;
      color: #ffffff;
      background: linear-gradient(135deg, var(--brand-600), var(--brand-700));
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 10px 22px -6px rgba(67, 56, 202, 0.5);
      transition: transform 0.12s, box-shadow 0.12s, filter 0.12s;
    }
    button:hover { filter: brightness(1.06); }
    button:active { transform: translateY(1px); box-shadow: 0 4px 12px -4px rgba(67, 56, 202, 0.4); }

    .contact-footer {
      margin-top: 30px;
      padding-top: 22px;
      border-top: 1px solid var(--line-soft);
      text-align: center;
    }
    .contact-footer .contact-hint {
      font-size: 12px; color: var(--ink-400); margin: 0 0 10px;
    }
    .contact-row {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      font-size: 13px; color: var(--ink-700); margin-bottom: 6px;
    }
    .contact-row svg { width: 15px; height: 15px; flex: none; color: var(--ink-400); }
    .contact-row a { color: var(--brand-600); font-weight: 600; text-decoration: none; }
    .contact-row a:hover { text-decoration: underline; }

    @media (max-width: 860px) {
      .split { flex-direction: column; }
      .brand-panel { padding: 40px 24px; min-height: 260px; }
      .brand-footnote { position: static; margin-top: 24px; }
      .brand-title { font-size: 26px; }
    }
  </style>
  {{BRAND_OVERRIDE}}
</head>
<body>
  <button class="theme-toggle" id="themeToggle" type="button" aria-label="Changer de thème">
    <svg class="icon-sun" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="10" cy="10" r="3.5" stroke="currentColor" stroke-width="1.5"/>
      <path d="M10 2v1.5M10 16.5V18M18 10h-1.5M3.5 10H2M15.5 4.5l-1 1M5.5 14.5l-1 1M15.5 15.5l-1-1M5.5 5.5l-1-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <svg class="icon-moon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M17 11.3A7 7 0 1 1 8.7 3a5.5 5.5 0 0 0 8.3 8.3Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>
  </button>

  <div class="split">
    <div class="brand-panel">
      <div class="brand-badge">
        {{BRAND_LOGO_LEFT}}
      </div>
      <h1 class="brand-title">{{BRAND_TITLE}}</h1>
      <div class="brand-divider"></div>
      <p class="brand-tagline">La plateforme de génération Excel pour vos déclarations douanières — précise, rapide, et centralisée.</p>
      <div class="brand-footnote">Gestion des Coûts · v1.0</div>
    </div>

    <div class="form-panel">
      <div class="form-wrap">
        <div class="form-logo">
          {{BRAND_LOGO_RIGHT}}
        </div>
        <h1 class="form-title">Espace <span class="accent">Connexion</span></h1>

        {{ERROR_BLOCK}}

        <form method="post" action="/login">
          <div class="field">
            <label for="username">Identifiant</label>
            <input type="text" id="username" name="username" autocomplete="username" placeholder="Votre identifiant" required autofocus />
          </div>
          <div class="field">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required />
          </div>
          <button type="submit">
            Accéder au portail
            <svg width="15" height="15" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 10h12M11 5l5 5-5 5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </form>

        <div class="contact-footer">
          {{CONTACT_ROWS}}
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('themeToggle').addEventListener('click', function () {
      var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });
  </script>
</body>
</html>
