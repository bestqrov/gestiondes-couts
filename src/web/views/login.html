<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connexion — Déclaration Douanière</title>
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <style>
    :root {
      --ink-900: #0f172a;
      --ink-700: #334155;
      --ink-500: #64748b;
      --ink-400: #94a3b8;
      --line: #e2e8f0;
      --line-soft: #eef2f7;
      --brand: #4338ca;
      --brand-600: #4f46e5;
      --brand-700: #3730a3;
      --brand-soft: #eef2ff;
      --danger: #b91c1c;
      --danger-bg: #fef2f2;
      --danger-line: #fecaca;
      --card-bg: #ffffff;
      --page-bg-1: radial-gradient(1100px 600px at 12% -10%, #eef2ff 0%, transparent 55%);
      --page-bg-2: radial-gradient(900px 500px at 100% 110%, #f0fdfa 0%, transparent 55%);
      --page-bg-3: #f8fafc;
      --input-bg: #f8fafc;
    }

    :root[data-theme="dark"] {
      --ink-900: #f1f5f9;
      --ink-700: #cbd5e1;
      --ink-500: #94a3b8;
      --ink-400: #64748b;
      --line: #334155;
      --line-soft: #1e293b;
      --brand: #818cf8;
      --brand-600: #6366f1;
      --brand-700: #818cf8;
      --brand-soft: #1e1b4b;
      --danger: #f87171;
      --danger-bg: #3f1212;
      --danger-line: #7f1d1d;
      --card-bg: #0f172a;
      --page-bg-1: radial-gradient(1100px 600px at 12% -10%, #1e1b4b 0%, transparent 55%);
      --page-bg-2: radial-gradient(900px 500px at 100% 110%, #052e2b 0%, transparent 55%);
      --page-bg-3: #020617;
      --input-bg: #1e293b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink-900);
      background: var(--page-bg-1), var(--page-bg-2), var(--page-bg-3);
      transition: background 0.2s, color 0.2s;
    }

    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--line-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--ink-700);
      transition: background 0.15s, border-color 0.15s;
    }
    .theme-toggle:hover { border-color: var(--brand-600); }
    .theme-toggle svg { width: 18px; height: 18px; }
    .theme-toggle .icon-moon { display: none; }
    :root[data-theme="dark"] .theme-toggle .icon-sun { display: none; }
    :root[data-theme="dark"] .theme-toggle .icon-moon { display: block; }

    .card {
      width: 100%;
      max-width: 380px;
      background: var(--card-bg);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 20px 50px -12px rgba(15, 23, 42, 0.14);
      padding: 36px 32px 32px;
      transition: background 0.2s, border-color 0.2s;
    }

    .badge {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--brand-600), var(--brand-700));
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      box-shadow: 0 8px 16px -6px rgba(67, 56, 202, 0.45);
    }

    .badge svg { width: 24px; height: 24px; }

    h1 {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin: 0 0 4px;
      color: var(--ink-900);
    }

    .subtitle {
      font-size: 13.5px;
      color: var(--ink-500);
      margin: 0 0 24px;
      line-height: 1.5;
    }

    .error {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid var(--danger-line);
      border-radius: 10px;
      padding: 11px 13px;
      margin-bottom: 18px;
      font-size: 13px;
      line-height: 1.45;
    }
    .error svg { flex: none; margin-top: 1px; }

    label {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--ink-700);
      margin: 0 0 6px;
      letter-spacing: 0.01em;
    }

    .field { margin-bottom: 16px; }

    input {
      width: 100%;
      padding: 11px 13px;
      font-size: 14.5px;
      font-family: inherit;
      color: var(--ink-900);
      background: var(--input-bg);
      border: 1.5px solid var(--line);
      border-radius: 9px;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }
    input::placeholder { color: var(--ink-400); }
    input:hover { border-color: var(--brand-600); }
    input:focus {
      outline: none;
      background: var(--card-bg);
      border-color: var(--brand-600);
      box-shadow: 0 0 0 3.5px rgba(79, 70, 229, 0.14);
    }

    button {
      width: 100%;
      margin-top: 6px;
      padding: 12px;
      font-size: 14.5px;
      font-weight: 600;
      font-family: inherit;
      color: #ffffff;
      background: linear-gradient(135deg, var(--brand-600), var(--brand-700));
      border: none;
      border-radius: 9px;
      cursor: pointer;
      box-shadow: 0 6px 16px -4px rgba(67, 56, 202, 0.45);
      transition: transform 0.12s, box-shadow 0.12s, filter 0.12s;
    }
    button:hover { filter: brightness(1.06); }
    button:active { transform: translateY(1px); box-shadow: 0 3px 10px -4px rgba(67, 56, 202, 0.4); }

    .footer-note {
      text-align: center;
      font-size: 11.5px;
      color: var(--ink-400);
      margin-top: 22px;
    }
  </style>
  {{BRAND_OVERRIDE}}
</head>
<body>
  <button class="theme-toggle" id="themeToggle" type="button" aria-label="Changer de thème">
    <svg class="icon-sun" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="10" cy="10" r="3.5" stroke="currentColor" stroke-width="1.5"/>
      <path d="M10 2v1.5M10 16.5V18M18 10h-1.5M3.5 10H2M15.5 4.5l-1 1M5.5 14.5l-1 1M15.5 15.5l-1-1M5.5 5.5l-1-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <svg class="icon-moon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M17 11.3A7 7 0 1 1 8.7 3a5.5 5.5 0 0 0 8.3 8.3Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>
  </button>
  <div class="card">
    <div class="badge">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M7 3.5h7l5 5V19a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 5 19V5A1.5 1.5 0 0 1 6.5 3.5H7Z" stroke="white" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M14 3.5V8a1 1 0 0 0 1 1h4.5" stroke="white" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M8.5 13.2l2.1 2.1 4.3-4.5" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>Connexion</h1>
    <p class="subtitle">Accédez à l'outil de génération Excel pour les déclarations douanières.</p>

    {{ERROR_BLOCK}}

    <form method="post" action="/login">
      <div class="field">
        <label for="username">Identifiant</label>
        <input type="text" id="username" name="username" autocomplete="username" placeholder="Votre identifiant" required autofocus />
      </div>
      <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required />
      </div>
      <button type="submit">Se connecter</button>
    </form>

    <p class="footer-note">Accès réservé — usage interne</p>
  </div>
  <script>
    document.getElementById('themeToggle').addEventListener('click', function () {
      var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });
  </script>
</body>
</html>
